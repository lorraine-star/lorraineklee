name: Momentic E2E

# Smoke-tests each deployment with Momentic (https://momentic.ai).
#
# How it runs:
#   • Automatically — when the Vercel GitHub integration reports a successful
#     deployment (preview on PRs, production on main). The deployment URL is
#     read from the event and passed to Momentic via --url-override. Automatic
#     runs execute only the fast `smoke` label so every deploy stays quick.
#   • Manually      — via the "Run workflow" button, supplying any URL. The
#     optional "labels" input picks which tests run: e.g. `regression` for the
#     broader page-coverage suite, `smoke` for criticals, or leave it blank to
#     run the entire test suite.
#
# One-time setup:
#   1. Add a repo secret MOMENTIC_API_KEY (Momentic dashboard → API keys).
#   2. Connect the Vercel ↔ GitHub integration so deployment_status events
#      fire. Until then, use the manual "Run workflow" button.
#   3. If preview deployments are protected (Vercel returns 401), add a
#      VERCEL_BYPASS repo secret — Vercel → Settings → Deployment Protection →
#      "Protection Bypass for Automation". The run step applies it automatically.

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      url:
        description: "Base URL to test (e.g. a Vercel preview URL)"
        required: true
        type: string
      labels:
        description: "Label filter (e.g. smoke or regression). Leave blank to run all tests."
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke tests
    # deployment_status fires for every state; only act on successful deploys.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.deployment_status.state == 'success' }}
    timeout-minutes: 15
    runs-on: ubuntu-latest
    env:
      MOMENTIC_API_KEY: ${{ secrets.MOMENTIC_API_KEY }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install browsers
        run: npx momentic install-browsers --all

      - name: Resolve target URL
        id: target
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_URL: ${{ inputs.url }}
          DEPLOY_URL: ${{ github.event.deployment_status.environment_url }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "url=$INPUT_URL" >> "$GITHUB_OUTPUT"
          else
            echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve label filter
        id: labels
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_LABELS: ${{ inputs.labels }}
        run: |
          # Automatic (deployment_status) runs stay fast: smoke only.
          # Manual runs honor the optional labels input; blank = run all tests.
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            LABEL="$INPUT_LABELS"
          else
            LABEL="smoke"
          fi
          # The labels input is operator-supplied, so validate it against an
          # allowlist before it reaches the shell: simple tokens (letters,
          # digits, _, -) optionally comma-separated. This blocks shell
          # metacharacters and any newline that could inject extra
          # $GITHUB_OUTPUT entries. The value is later passed quoted as a single
          # --labels argument (see the run step), never word-split.
          if [ -n "$LABEL" ] && ! printf '%s' "$LABEL" | grep -Eq '^[A-Za-z0-9_,-]+$'; then
            echo "::error::Invalid labels input '$LABEL'. Allowed: letters, digits, _, -, and commas." >&2
            exit 1
          fi
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"

      - name: Run Momentic tests
        env:
          TARGET_URL: ${{ steps.target.outputs.url }}
          LABEL: ${{ steps.labels.outputs.label }}
          # Set this secret only if Vercel deployment protection is enabled;
          # when present it's appended so the protected deployment loads.
          VERCEL_BYPASS: ${{ secrets.VERCEL_BYPASS }}
        run: |
          URL="$TARGET_URL"
          if [ -n "$VERCEL_BYPASS" ]; then
            # URL-encode the secret (in case it has reserved chars) and mask the
            # encoded form in logs too, since it differs from the raw secret.
            ENC_BYPASS=$(jq -rn --arg v "$VERCEL_BYPASS" '$v|@uri')
            echo "::add-mask::$ENC_BYPASS"
            case "$URL" in
              *\?*) SEP="&" ;;
              *)    SEP="?" ;;
            esac
            URL="${URL}${SEP}x-vercel-protection-bypass=${ENC_BYPASS}&x-vercel-set-bypass-cookie=true"
          fi
          # Quote the validated label as a single argument (blank = run all tests).
          if [ -n "$LABEL" ]; then
            npx momentic run --url-override "$URL" --labels "$LABEL"
          else
            npx momentic run --url-override "$URL"
          fi

      - name: Upload results
        if: always()
        run: npx momentic results upload test-results
