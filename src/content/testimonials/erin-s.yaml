author: Erin S.
quote: Lorraine was poised, warm, friendly, and a fountain of knowledge. I was
  impressed by her ability to maintain such an approachable energy while also
  positioning herself as a true subject matter expert. After seeing Lorraine
  speak, I've invited her to deliver some presentations to my current
  organization (the sales division of a global hospitality leader) all of which
  have received high-praise and rave reviews from participants. Lorraine is a
  pleasure to partner with, and an all-star presenter. I highly recommend her
  for any organization looking to grow their team members' public speaking,
  video, presentation, and social media capabilities.
