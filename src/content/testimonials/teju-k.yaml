author: Teju K.
quote: I would HIGHLY recommend Lorraine as an engaging speaker who consistently
  delivers valuable and actionable insights. As a moderator at a LinkedIn Asian
  Alliance ERG event where Lorraine spoke, I was so impressed by her captivating
  speaking style, she kept the audience fully engaged from start to finish. What
  sets Lorraine apart is her ability to provide actionable advice. She
  simplified complex and vague topics into practical steps that attendees could
  start implementing immediately.
