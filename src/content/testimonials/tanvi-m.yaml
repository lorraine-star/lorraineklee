author: Tanvi M.
quote: To say that she was a hit would be an understatement. Lorraine was so
  engaging, articulate, and insightful throughout the session. She delivered the
  information in a way that anyone could understand and implement. The attendees
  got a lot out of the presentation based on the questions they asked and how
  engaged they were in chat till the end. Even during the planning phase, it was
  such a treat to work with Lorraine. She was always responsive, enthusiastic,
  ready to collaborate, and as kind they come. Truly an honor and pleasure to
  work with her. If you ever have a chance to listen to her, I highly recommend
  you take that opportunity.
