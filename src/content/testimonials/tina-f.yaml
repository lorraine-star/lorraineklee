author: Tina F.
quote: As an organizer of Hawaii Women in Tech, I reached out to Lorraine to
  invite her be a panel speaker for our session on “Networking and Building
  Confidence.” I was thrilled that she accepted our invitation; I knew she would
  be a fantastic panelist because I had previously attended an event whre she
  had spoken on a similar topic. As a subscriber to Lorraine’s newsletter, I
  also knew that the focus of our session was one of her areas of expertise.
  Lorraine did not disappoint! We covered topics including how to leverage
  LinkedIn as a networking tool, growing and maintaining our professional
  network in authentic ways, and managing imposter syndrome. Lorraine offered
  dozens of practical, actionable steps to our members for addressing these
  questions and so many more. Her natural, conversational speaking style kept
  the conversation flowing organically as she addressed questions from our
  members and engaged in dialogue with fellow panelists. Our members are
  grateful for the valuable advice they took away from the session and we are
  delighted that Lorraine was able to be a panelist. If you are looking for an
  engaging speaker who brings a wealth of information about these topics, I
  highly recommend reaching out to Lorraine.
