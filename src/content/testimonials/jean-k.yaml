author: Jean K.
quote: It was a complete pleasure to bring in Lorraine to Figma's AAPI ERG
  community during AAPI month as our special guest speaker to conduct a live
  workshop all about building influence as an Asian American professional at
  work. And the audience loved it! They raved about Lorraine's session
  immediately afterwards as they walked away with more confidence and clarity to
  bring their best selves to work. They were more engaged in the chat compared
  to previous speaker sessions, and one of the members shared how thoughtful and
  beautiful the entire presentation was which contributes to better engagement.
  She was also super organized, timely, and welcomed feedback (a huge plus in
  working with a speaker). I would give Lorraine a 10/10 and can't wait to bring
  her again in the future!
