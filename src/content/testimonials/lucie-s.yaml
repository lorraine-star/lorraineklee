author: Lucie S.
quote: Lorraine is a “go-to” expert that I’ve brought in multiple times to speak
  to alumni of Northwestern University. Each program Lorraine offers is
  incredibly popular and garners hundreds of registrants, far more than other
  speakers. Alumni recognize her name when it appears in our newsletters and her
  topics always speak to their interests. Our programs are scheduled for an hour
  but when Lorraine presents, the programs could easily run twice that length
  with the number of questions posed by our highly engaged attendees. Whenever I
  reach out to Lorraine, she manages to quickly accommodate me and is a gracious
  host who makes my job easier. If you want a speaker who will engage your
  audience, is warm and inviting, is credible, and has expertise as a LinkedIn
  Learning Instructor, you can’t go wrong with Lorraine.
