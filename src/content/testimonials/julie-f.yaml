author: Julie F.
quote: Last November I was on an Alaska Airlines flight and watched a LinkedIn
  Learning video offered though their inflight entertainment. I found myself
  pausing and taking notes and when it ended, I knew that I wanted to invite
  Lorraine to speak at a BD NOW credit union event for business development
  professionals. She's a bright star and her expertise is critical in a world
  that is increasingly relying on video. Lorraine was a delight to work with -
  she listened, was totally engaged and enthusiastic about meeting the needs of
  the group, asked smart questions, and then delivered a value packed session
  for us!
