author: Apurva B.
quote: I'm the ERG lead for a Women's group at Microsoft, and engaged with
  Lorraine through LinkedIn to bring her on board as a guest speaker for the
  group. I was confident in signing up with her for a fireside chat. The session
  was clear, concise, and had live examples. Lorraine was easy to speak to and
  had her material prepped for the group. I would highly recommend her as a
  speaker for any public speaking opportunities and I am looking forward to
  continue working with her!
