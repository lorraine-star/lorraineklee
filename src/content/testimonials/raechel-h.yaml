author: Raechel H.
quote: I've attended several courses that Lorraine has taught with Electives and
  am consistently impressed by her ability to connect with a fully remote
  audience and consistently give real and actionable advice to help attendees
  accomplish their goals ASAP. She is incredibly engaging and gives tactical
  advice in the moment - not something that always happens in a virtual
  environment. As Chief of Staff to the CFO at HubSpot, her teachings are not
  only relevant for me in my day-to-day, but they're relevant for my team as
  well.
