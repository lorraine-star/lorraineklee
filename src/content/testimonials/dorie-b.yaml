author: Dorie B.
quote: I knew I wanted to collaborate with Lorraine again. She did an amazing
  job being a resource for our Black History Month virtual career fair, that I
  immediately seized the opportunity to bring her back for a live opportunity.
  Lorraine was beyond what I expected in-person. She is an events manager’s
  dream, she is organized, punctual and produces thoughtful content for the
  intended audience. Her live presentation was filled with great insight about
  how to present your best-self on LinkedIn. She was an engaging speaker and
  even stayed around after her presentation to answer audience members’
  questions.
