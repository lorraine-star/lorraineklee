author: Nicole H.
quote: I’ve always admired her work during her time at LinkedIn and this course
  is just as good. It includes tips for making sure introverts are heard or have
  ways to give feedback, keeping remote employees engaged during hybrid meetings
  and an amazing idea for those meetings that don’t require team input -
  Asynchronous videos. Great ideas in a short time. Check it out!
