author: Shreya
quote: I attended Lorraine's session on Building Influence for Asian leaders at
  LinkedIn and it was of interest to me since I have grown up in South-East Asia
  and am looking for practical advice on how to influence without authority as
  well as craft-fully creating visibility in the corporate workplace. Lorraine
  had some great advice, practical tips (love that they were short & memorable)
  and her presentation style was so engaging and personal. I would recommend her
  to anyone learning to grow their soft skills with confidence.
