author: Amy J.
quote: Lorraine gave a session on the topic of building influence to our small
  group of affinity group members at eero/Amazon, and she did not disappoint!
  Our attendees gave glowing feedback about how useful and informative the
  session was. It was packed with a wealth of data-driven insights, actionable
  recommendations, and opportunities for audience members to weigh in and stay
  engaged. Lorraine was super professional, and her content made the hour pass
  by in a flash. We would love to host her again!
