author: Doris T.
quote: Lorraine is an excellent presenter. We asked her to record a short
  session for emerging newsroom managers in a Poynter Institute workshop about
  how to onboard and lead remote teams, and she fit lots of valuable information
  into the time without making it feel rushed or overpacked. Her presentation
  style is engaging whether she's live or recorded, and she struck the perfect
  combination of actionable tips with helpful on-screen text/graphics to
  reinforce her message. She was also wonderful communicating leading up to the
  recording — sharing an outline for feedback, then recording a dress rehearsal
  for additional input. She clearly understood our expectations and exceeded in
  how she delivered.
