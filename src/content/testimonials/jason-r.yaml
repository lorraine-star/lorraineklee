author: Jason R.
quote: Lorraine is a fantastic speaker who has given two TED Talk-caliber
  sessions at Cisco. Her talks have been some of the most popular among our
  group. Her presentations are dynamic, interactive, and filled with real-life
  examples that resonated with our team members. I enthusiastically recommend
  Lorraine as a speaker and presenter to any organization. We hope to have her
  back again at Cisco soon!
