author: Samantha L.
quote: I'm so glad that Lorraine came to speak to the GitLab team during our
  All-Remote Communications speaker series. Her presentation was engaging, easy
  to follow, and introduced our team to new and innovative ideas on how to
  improve our video communications. Her presentation encouraged engagement in an
  authentic way that made everyone enjoy the call. Lorraine was open to having a
  Q&A after her presentation, which was a great way for our team members to
  connect with her directly.
