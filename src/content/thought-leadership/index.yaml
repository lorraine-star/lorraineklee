interviews:
  - name: Shelley Zalis
    role: Founder, The Female Quotient
    description: >-
      Shelley Zalis, founder of The Female Quotient, has dedicated herself to
      the business of gender equality. She sat down with Lorraine to share
      simple hacks she uses to achieve gender parity at work.
    thumbnail_fit: cover
    youtube_id: zvplacEd8zs
    cta_label: Watch now
  - name: Esther Wojcicki
    role: Educator
    description: >-
      Educator Esther Wojcicki has raised three very successful children and is
      asked constantly for her secret. It starts with giving children a sense of
      comfort and control.
    thumbnail_fit: cover
    youtube_id: 8kBJfLzocHM
    cta_label: Watch now
  - name: Meena Harris
    role: Phenomenal Woman Action Campaign
    description: >-
      Meena Harris of the Phenomenal Woman Action Campaign joined Lorraine to
      talk diversity and inclusion, and why it starts with looking honestly at
      the numbers.
    thumbnail_fit: cover
    youtube_id: ODWo8FKAzYM
    cta_label: Watch now
