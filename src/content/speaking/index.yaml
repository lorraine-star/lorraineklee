topics:
  - number: "01"
    slug: ""
    tag: "Most Popular"
    title: "Supercharge Your Executive Presence"
    subtitle: "A Leader's Guide to Managing Your Brand At Work"
    note: ""
    gif: "/images/speaking/keynotes/exec-presence.webp"
    gif_alt: "Lorraine K. Lee delivering an executive presence keynote on stage"
    format: "Keynote / Workshop"
    clip_url: ""
    talk_track: []
    description: |
      Executive presence is a critical soft skill, universally acknowledged yet often elusive, both in terms of its definition and application. Yet if we want to advance professionally, it's something we need to learn and use in our day-to-day interactions.

      The fundamental characteristics remain the same: traits like gravitas, charisma, and your appearance. However, as our way of working has evolved due to economic, cultural, and technological changes, so has the definition of executive presence.

      Today, the traditional markers of executive presence have moved past conventional expectations like business suits and formal business lunches. Instead, in our modern working landscape, executive presence lies in authentic leadership, crafting and projecting a career brand that follows you in and out of the office, and nurturing relationships built on trust and respect.

      Join Lorraine K. Lee, an expert in supercharging your professional presence, as she delves into the 3Cs of executive presence for today's leaders. Whether you're just starting your career journey or a seasoned professional, this session is designed to empower you with the confidence and skills to enhance your leadership impact and executive presence in any organization.
    takeaways:
      - "Uncover common communication pitfalls that undermine your presence, and learn strategies for turning them into your strength."
      - "Define your UPI (your Unique and Powerful Introduction) that succinctly captures your professional identity and value."
      - "Discover how to build stronger relationships and grow trust with teammates."
  - number: "02"
    slug: ""
    tag: ""
    title: "How To Build Influence in the Hybrid Office"
    subtitle: ""
    note: "For General Audiences and AAPI Groups"
    gif: "/images/speaking/keynotes/build-influence.webp"
    gif_alt: "Lorraine K. Lee presenting on building influence at work"
    format: "Keynote / Workshop"
    clip_url: ""
    talk_track: []
    description: |
      Building influence feels tougher than ever these days, with so many distractions grabbing others' attention. We need to juggle building relationships both in-person and virtually, while delivering results with fewer resources.

      The solution? Harnessing your influence. Influence has the power to help us get promoted, become more trusted and recognized, and be seen as a leader who moves work forward.

      Follow the simple but highly impactful RAVE Model to increase and strengthen your influence in the workplace. After the session, you'll be able to immediately implement actionable advice for key areas of influence at work.

      Learn from Lorraine K. Lee, a leader at the intersection of editorial and tech, a top-rated virtual keynote speaker, and an instructor with LinkedIn Learning and Stanford Continuing Studies.
    takeaways:
      - "The RAVE Model and how to apply it to your daily life."
      - "Simple yet actionable ways to boost your influence, in-person and virtually."
      - "Mistakes you may be making that are hurting your influence."
  - number: "03"
    slug: ""
    tag: ""
    title: "How To Lead With Impact"
    subtitle: "Strategies to Build Collaboration and Trust On Your Team"
    note: ""
    gif: "/images/speaking/keynotes/lead-with-impact.webp"
    gif_alt: "Lorraine K. Lee leading a manager training session"
    format: "Keynote / Manager training"
    clip_url: ""
    talk_track: []
    description: |
      Whether you're stepping into management for the first time or have been leading for a few years, one truth stays the same: collaborative teams don't just happen, they're built with intention. Many managers struggle with the same challenges: earning trust quickly, running meetings that feel productive instead of draining, and keeping people motivated when demands are high and time is short.

      How do you set clear expectations so your team knows what success looks like? How do you make the most of your 1:1s and everyday touchpoints so they build trust rather than feel like a formality? And how do you create team dynamics that leave people feeling recognized, supported, and engaged?

      In this interactive session, Lorraine K. Lee, bestselling author and instructor with LinkedIn Learning and Stanford, will share practical strategies you can start using immediately. You'll learn how to establish strong foundations of trust, lead meetings that actually move work forward, and shape team dynamics that keep people performing at their best. Whether you're a new manager building confidence or an experienced manager looking for fresh approaches, this session will help you set your team up for success and continue growing as a leader.
    takeaways:
      - "Cut the uncertainty: use three foundational moves, 30-60-90 resets, skip-level conversations, and career goal discussions, to give your team clarity and build trust from the start."
      - "Make meetings actually useful: transform 1:1s and everyday touchpoints from autopilot small talk into meaningful conversations, and learn how to show up on video with presence and credibility."
      - "Keep your team engaged: strengthen team dynamics by giving feedback people can act on, recognizing them in ways that resonate, and setting simple communication norms."
  - number: "04"
    slug: ""
    tag: "#2 Most Popular"
    title: "9 Essential Tips For More Effective Hybrid and Virtual Meetings"
    subtitle: ""
    note: "Lorraine is a LinkedIn Learning instructor for two popular meeting courses (40,000+ learners)."
    gif: "/images/speaking/keynotes/effective-meetings.webp"
    gif_alt: "Lorraine K. Lee presenting tips for more effective virtual meetings"
    format: "Keynote / Workshop"
    clip_url: ""
    talk_track: []
    description: |
      Meetings are a multi-billion dollar problem. And they're not going anywhere.

      With more finite resources and human capital, meetings are a major factor in what can make or break an organization.

      We have 250% more meetings every day than we did before the pandemic. We're also spending more than half of our standard workweek in meetings, for a whopping total of 21.5 hours. It's costing companies billions and leading to unhappy employees, burnout, and Zoom fatigue, a recipe for disaster.

      Join Lorraine as she shares strategies for making your virtual and hybrid meetings more engaging, collaborative, and productive, so that your employees get more flexibility in their schedules, see better results, and have an overall more positive experience at work.
    takeaways:
      - "Make virtual meetings more engaging and efficient."
      - "Capture and keep your audience's attention."
      - "Boost visibility and opportunities."
  - number: "05"
    slug: ""
    tag: ""
    title: "How To Transform Your LinkedIn Presence"
    subtitle: ""
    note: "Optional Add-On: LinkedIn Workbook"
    gif: "/images/speaking/keynotes/linkedin-presence.webp"
    gif_alt: "Lorraine K. Lee presenting on building a LinkedIn presence"
    format: "Keynote / Workshop"
    clip_url: ""
    talk_track: []
    description: |
      LinkedIn is much more than a job search site. But with more than 1 billion members and a growing pool of new features, it can be difficult to know where to start and how to stand out. These days, your online brand and presence are just as important, if not more so, to help grow your career and visibility.

      If you want to build your brand, attract recruiters, establish yourself as a thought leader, and find opportunities you never expected, it's time to learn how to take advantage of all LinkedIn has to offer.

      Learn from Lorraine, one of the founding editors at LinkedIn and a LinkedIn Learning Instructor with more than 300,000 followers, who will share her insider tips and tricks for leveraging the largest professional social network.
    takeaways:
      - "How to optimize your profile to get more opportunities."
      - "Best practices for sharing content to grow your audience and visibility."
      - "Techniques to build credibility and be recognized as a thought leader."
