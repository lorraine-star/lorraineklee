      label: "keynotes delivered since 2018"
    - value: "5/5"
      label: "average speaker rating (2023)"
reel_section:
  eyebrow: "Watch her in the room"
  heading: "The speaker reel"
  heading_accent: "in 90 seconds."
  body: "The fastest way to see how Lorraine reads a room, builds rapport, and lands an idea that audiences quote weeks later."
  embed_url: "https://www.youtube.com/embed/trL8hDlyviw"
  caption: "Highlights from recent keynotes for LinkedIn, Cisco, and ServiceNow."
topics_section:
  eyebrow: "Signature keynotes"
  heading: "Four talks that travel"
  heading_accent: "everywhere."
  lead: "Each keynote is built around one durable shift the audience makes, not a list of tips. Lorraine adapts every session to your audience, business context, and the moment in your year."
topics:
  - number: "01"
    slug: "executive-presence"
    title: "Building Executive Presence"
    description: "How rising leaders earn trust before they earn the title, and the micro-moments that decide which leaders get promoted."
    format: "Keynote / Workshop"
    clip_url: ""
    talk_track:
      - time: "00:00"
        label: "Why presence is the unfair advantage"
      - time: "08:00"
        label: "The three credibility signals senior leaders read first"
      - time: "20:00"
        label: "Practicing presence in real meetings"
      - time: "35:00"
        label: "Q&A and on-stage coaching"
    takeaways:
      - "A repeatable framework for projecting calm authority in high-stakes rooms."
      - "Specific language patterns that signal seniority before the title catches up."
      - "An honest read on the habits that are quietly capping a manager's progression."
  - number: "02"
    slug: "linkedin-presence"
    title: "Showing Up Powerfully on LinkedIn"
    description: "A repeatable system for visibility online without becoming a content creator, built for executives and their teams."
    format: "Keynote / Half-day"
    clip_url: ""
    talk_track:
      - time: "00:00"
        label: "The 3-post-per-week executive cadence"
      - time: "12:00"
        label: "Profiles that read like leadership, not résumés"
      - time: "25:00"
        label: "Engagement as a team sport"
      - time: "40:00"
        label: "Q&A and live profile teardowns"
    takeaways:
      - "A sustainable LinkedIn rhythm that doesn't depend on going viral."
      - "Profile copy that lands with recruiters, peers, and board members."
      - "How to coach a leadership team to use LinkedIn without sounding like marketing."
  - number: "03"
    slug: "remote-leadership"
    title: "Leading High-Performing Remote Teams"
    description: "What changes when your best people never share a room. Frameworks for hybrid trust, hybrid culture, and hybrid promotion."
    format: "Keynote / Manager training"
    clip_url: ""
    talk_track:
      - time: "00:00"
        label: "The trust gap that hybrid teams quietly carry"
      - time: "10:00"
        label: "Rituals that build belonging without travel"
      - time: "22:00"
        label: "Promoting fairly when no one is in the office"
      - time: "38:00"
        label: "Q&A and manager scenarios"
    takeaways:
      - "Concrete rituals that compress the trust-building timeline by months."
      - "Decision frameworks for hybrid promotion and visibility."
      - "Tools managers can use Monday morning, not next quarter."
  - number: "04"
    slug: "better-meetings"
    title: "Running Meetings People Actually Want to Attend"
    description: "The Three C's of credible communication, applied to the meeting culture every company quietly hates."
    format: "Workshop / 60 min"
    clip_url: ""
    talk_track:
      - time: "00:00"
        label: "Why meetings broke (and the cost)"
      - time: "10:00"
        label: "The Three C's: clarity, confidence, connection"
      - time: "25:00"
        label: "Templates for the four meetings every leader runs"
      - time: "45:00"
        label: "Q&A and meeting redesigns"
    takeaways:
      - "A redesign for the four meetings every leader runs every week."
      - "A simple test for whether a meeting should exist."
      - "Scripts that turn passive attendees into active contributors."
custom_programs_section:
  eyebrow: "Built for your team"
  heading: "Custom leadership"
  heading_accent: "programs."
  body: "When a single keynote won't do it, Lorraine builds multi-session programs that bring managers, high-potentials, and executive teams up to the same level of confidence and clarity. Programs are designed around your business context, your competencies, and the moment your organization is in."
  bullets:
    - "Multi-session manager and high-potential cohorts (4-8 sessions)"
    - "Executive team intensives focused on presence and communication"
    - "Custom workshops co-designed with L&D and people partners"
    - "Coaching pods that run between live sessions to lock in habits"
  cta_label: "Ask about custom programs"
  cta_url: "/contact"
