testimonials_section:
  eyebrow: "From the people who book her"
  heading: "Event organizers don't"
  heading_accent: "regret it."
  lead: "A handful of the recent ones, in their own words. References and the full file available on request."
testimonials:
  - quote: "I've attended several courses that Lorraine has taught with Electives and am consistently impressed by her ability to connect with a fully remote audience and consistently give real and actionable advice to help attendees accomplish their goals ASAP. She is incredibly engaging and gives tactical advice in the moment — not something that always happens in a virtual environment. As Chief of Staff to the CFO at HubSpot, her teachings are not only relevant for me in my day-to-day, but they're relevant for my team as well."
    name: "Raechel H."
    role: "Chief of Staff to HubSpot's CFO"
    initials: "RH"
    photo: "/images/speaking/testimonials/raechel-h.webp"
    featured: false
  - quote: "Lorraine brought high energy and practical advice to our Women Leaders in Data and AI session, How to Build Influence. This was an incredibly well-received session for our executive leaders. As the Director of Member Services, I aim to bring high-caliber speakers to our events. Lorraine came prepared with so many helpful tips and tricks that our members can apply immediately. Our attendees had great feedback and this event was a win for us!"
    name: "Julie H."
    role: "Women Leaders in Data & AI"
    initials: "JH"
    photo: "/images/speaking/testimonials/julie-h.webp"
    featured: false
  - quote: "Lorraine gave a session on the topic of building influence to our small group of affinity-group members at eero/Amazon, and she did not disappoint! Our attendees gave glowing feedback about how useful and informative the session was. It was packed with a wealth of data-driven insights, actionable recommendations, and opportunities for audience members to weigh in and stay engaged. Lorraine was super professional, and her content made the hour pass by in a flash. We would love to host her again!"
    name: "Amy J."
    role: "eero / Amazon"
    initials: "AJ"
    photo: "/images/speaking/testimonials/amy-j.webp"
    featured: false
  - quote: "I'm so glad that Lorraine came to speak to the GitLab team during our All-Remote Communications speaker series. Her presentation was engaging, easy to follow, and introduced our team to new and innovative ideas on how to improve our video communications. Her presentation encouraged engagement in an authentic way that made everyone enjoy the call. Lorraine was open to having a Q&A after her presentation, which was a great way for our team members to connect with her directly."
    name: "Samantha L."
    role: "GitLab"
    initials: "SL"
    photo: "/images/speaking/testimonials/samantha-l.webp"
    featured: false
  - quote: "Last November I was on an Alaska Airlines flight and watched a LinkedIn Learning video offered through their inflight entertainment. I found myself pausing and taking notes, and when it ended I knew that I wanted to invite Lorraine to speak at a BD NOW credit union event for business-development professionals. She's a bright star and her expertise is critical in a world that is increasingly relying on video. Lorraine was a delight to work with — she listened, was totally engaged and enthusiastic about meeting the needs of the group, asked smart questions, and then delivered a value-packed session for us!"
    name: "Julie F."
    role: "BD NOW"
    initials: "JF"
    photo: "/images/speaking/testimonials/julie-f.webp"
    featured: false
  - quote: "Lorraine is an excellent presenter. We asked her to record a short session for emerging newsroom managers in a Poynter Institute workshop about how to onboard and lead remote teams, and she fit lots of valuable information into the time without making it feel rushed or overpacked. Her presentation style is engaging whether she's live or recorded, and she struck the perfect combination of actionable tips with helpful on-screen text and graphics to reinforce her message."
    name: "Doris T."
    role: "Poynter Institute"
    initials: "DT"
    photo: "/images/speaking/testimonials/doris-t.webp"
    featured: false
  - quote: "I'm the ERG lead for a Women's group at Microsoft, and engaged with Lorraine through LinkedIn to bring her on board as a guest speaker for the group. The session was clear, concise, and had live examples. Lorraine was easy to speak to and had her material prepped for the group. I would highly recommend her as a speaker for any public-speaking opportunities and I am looking forward to continuing to work with her!"
    name: "Apurva B."
    role: "ERG Lead, Microsoft"
    initials: "AB"
    photo: "/images/speaking/testimonials/apurva-b.png"
    featured: false
  - quote: "I recently invited her to speak at Zoom as part of our internal speaker series. Lorraine led a masterclass in engaging an audience virtually, including using cutting-edge tools to elevate virtual storytelling. She was by far the most engaging speaker we've had in the series."
    name: "Arun J."
    role: "Zoom"
    initials: "AJ"
    photo: "/images/speaking/testimonials/arun-j.webp"
    featured: false
  - quote: "I would HIGHLY recommend Lorraine as an engaging speaker who consistently delivers valuable and actionable insights. As a moderator at a LinkedIn Asian Alliance ERG event where Lorraine spoke, I was so impressed by her captivating speaking style — she kept the audience fully engaged from start to finish. What sets Lorraine apart is her ability to provide actionable advice. She simplified complex and vague topics into practical steps that attendees could start implementing immediately."
    name: "Teju K."
    role: "LinkedIn"
    initials: "TK"
    photo: "/images/speaking/testimonials/teju-k.webp"
    featured: false
  - quote: "Lorraine did a tremendous job presenting at TWE's Tech Fair using Prezi. She upskilled the team on how we can overcome \"Zoom Fatigue\" and build virtual influence to better engage with our stakeholders. Our team members were amazed at the quality of the content. Some stated they could not believe she was presenting live due to how professionally she spoke and how interactive the slide contents were."
    name: "Max B."
    role: "Treasury Wine Estates"
    initials: "MB"
    photo: "/images/speaking/testimonials/max-b.webp"
    featured: false
  - quote: "I knew I wanted to collaborate with Lorraine again. She did an amazing job being a resource for our Black History Month virtual career fair, so I immediately seized the opportunity to bring her back for a live opportunity. Lorraine was beyond what I expected in person. She is an event manager's dream — organized, punctual, and produces thoughtful content for the intended audience. Her live presentation was filled with great insight about how to present your best self on LinkedIn, and she even stayed around after to answer audience members' questions."
    name: "Dorie B."
    role: "National Urban League"
    initials: "DB"
    photo: "/images/speaking/testimonials/dorie-b.webp"
    featured: false
  - quote: "As an organizer of Hawaii Women in Tech, I reached out to Lorraine to invite her to be a panel speaker for our session on \"Networking and Building Confidence.\" I was thrilled that she accepted. We covered topics including how to leverage LinkedIn as a networking tool, growing and maintaining our professional network in authentic ways, and managing imposter syndrome. Lorraine offered dozens of practical, actionable steps to our members. Her natural, conversational speaking style kept the conversation flowing organically. If you are looking for an engaging speaker who brings a wealth of information about these topics, I highly recommend reaching out to Lorraine."
    name: "Tina F."
    role: "Hawaii Women in Tech"
    initials: "TF"
    photo: "/images/speaking/testimonials/tina-f.webp"
    featured: false
  - quote: "It was a complete pleasure to bring Lorraine in to Figma's AAPI ERG community during AAPI month as our special guest speaker to conduct a live workshop all about building influence as an Asian American professional at work. And the audience loved it! They raved about Lorraine's session immediately afterwards as they walked away with more confidence and clarity to bring their best selves to work. She was also super organized, timely, and welcomed feedback. I would give Lorraine a 10/10 and can't wait to bring her again in the future!"
    name: "Jean K."
    role: "Figma"
    initials: "JK"
    photo: "/images/speaking/testimonials/jean-k.webp"
    featured: false
  - quote: "Lorraine is a fantastic speaker who has given two TED Talk-caliber sessions at Cisco. Her talks have been some of the most popular among our group. Her presentations are dynamic, interactive, and filled with real-life examples that resonated with our team members. I enthusiastically recommend Lorraine as a speaker and presenter to any organization. We hope to have her back again at Cisco soon!"
    name: "Jason R."
    role: "Cisco"
    initials: "JR"
    photo: "/images/speaking/testimonials/jason-r.webp"
    featured: false
  - quote: "Lorraine was poised, warm, friendly, and a fountain of knowledge. I was impressed by her ability to maintain such an approachable energy while also positioning herself as a true subject-matter expert. After seeing Lorraine speak, I've invited her to deliver presentations to my current organization (the sales division of a global hospitality leader), all of which have received high praise and rave reviews from participants. Lorraine is a pleasure to partner with, and an all-star presenter."
    name: "Erin S."
    role: "Fortune 500 Hospitality Brand"
    initials: "ES"
    photo: "/images/speaking/testimonials/erin-s.webp"
    featured: false
  - quote: "To say that she was a hit would be an understatement. Lorraine was so engaging, articulate, and insightful throughout the session. She delivered the information in a way that anyone could understand and implement. The attendees got a lot out of the presentation based on the questions they asked and how engaged they were in chat till the end. Even during the planning phase, it was such a treat to work with Lorraine. Truly an honor and pleasure to work with her."
    name: "Tanvi M."
    role: "Airmeet"
    initials: "TM"
    photo: "/images/speaking/testimonials/tanvi-m.webp"
    featured: false
  - quote: "Lorraine is a \"go-to\" expert that I've brought in multiple times to speak to alumni of Northwestern University. Each program Lorraine offers is incredibly popular and garners hundreds of registrants, far more than other speakers. Our programs are scheduled for an hour, but when Lorraine presents they could easily run twice that length with the number of questions posed by our highly engaged attendees. If you want a speaker who will engage your audience, is warm and inviting, is credible, and has expertise as a LinkedIn Learning Instructor, you can't go wrong with Lorraine."
    name: "Lucie S."
    role: "Northwestern University"
    initials: "LS"
    photo: "/images/speaking/testimonials/lucie-s.webp"
    featured: false
