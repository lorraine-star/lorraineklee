topics_section:
  eyebrow: "Most popular keynotes"
  heading: "Signature Keynotes"
  heading_accent: ""
  lead: ""
topics:
  - number: "01"
    slug: ""
    tag: "Most Popular"
    title: "Supercharge Your Executive Presence"
    description: "Executive presence is a critical soft skill, universally acknowledged yet often elusive, both in terms of its definition and application. It has evolved beyond traditional markers like business suits — today it centers on authentic leadership, crafting and projecting a career brand that follows you in and out of the office, and nurturing relationships built on trust and respect."
    format: "Keynote / Workshop"
    clip_url: ""
    talk_track: []
    takeaways:
      - "Uncover common communication pitfalls that undermine your presence — and learn strategies for turning them into your strength."
      - "Define your UPI (Unique and Powerful Introduction) that succinctly captures your professional identity and value."
      - "Discover how to build stronger relationships and grow trust with teammates."
  - number: "02"
    slug: ""
    tag: ""
    title: "How To Build Influence in the Hybrid Office"
    description: "Building influence feels tougher than ever these days, with so many distractions grabbing others' attention. Add in juggling in-person and virtual relationship-building while delivering results with fewer resources, and it's no wonder it feels hard. Lorraine introduces the RAVE Model to help your people increase their influence at work. Available for general audiences and AAPI groups."
    format: "Keynote / Workshop"
    clip_url: ""
    talk_track: []
    takeaways:
      - "The RAVE Model and how to apply it to your daily life."
      - "Simple yet actionable ways to boost your influence, in-person and virtually."
      - "Mistakes you may be making that are hurting your influence."
  - number: "03"
    slug: ""
    tag: ""
    title: "How To Lead With Impact"
    description: "Whether you're stepping into management for the first time or have been leading for a few years, one truth stays the same: collaborative teams don't just happen — they're built with intention. This keynote covers how to establish trust, run productive meetings, and create team dynamics that keep people engaged."
    format: "Keynote / Manager training"
    clip_url: ""
    talk_track: []
    takeaways:
      - "Cut the uncertainty: use three foundational moves — 30-60-90 resets, skip-level conversations, and career goal discussions — to give your team clarity and build trust from the start."
      - "Make meetings actually useful: transform 1:1s and everyday touchpoints from autopilot small talk into meaningful conversations, and show up on video with presence and credibility."
      - "Keep your team engaged: give feedback people can act on, recognize them in ways that resonate, and set simple communication norms."
  - number: "04"
    slug: ""
    tag: "#2 Most Popular"
    title: "9 Essential Tips For More Effective Hybrid & Virtual Meetings"
    description: "Meetings are a multi-billion dollar problem. And they're not going anywhere — organizations hold 250% more meetings every day than we did before the pandemic. This session tackles Zoom fatigue and meeting burnout head-on with practical strategies that make every meeting count."
    format: "Keynote / Workshop"
    clip_url: ""
    talk_track: []
    takeaways:
      - "Make virtual meetings more engaging and efficient."
      - "Capture and keep your audience's attention."
      - "Boost visibility and opportunities."
  - number: "05"
    slug: ""
    tag: ""
    title: "How To Transform Your LinkedIn Presence"
    description: "LinkedIn is much more than a job-search site. But with more than 1 billion members and a growing pool of new features, it can be difficult to know where to start. Your online brand and presence are just as important — if not more so — to help grow your career and visibility. Optional LinkedIn Workbook add-on available."
    format: "Keynote / Workshop"
    clip_url: ""
    talk_track: []
    takeaways:
      - "How to optimize your profile to get more opportunities."
      - "Best practices for sharing content to grow your audience and visibility."
      - "Techniques to build credibility and be recognized as a thought leader."
custom_programs_section:
  eyebrow: "Built for your team"
  heading: "Custom leadership"
  heading_accent: "programs."
  body: "When a single keynote won't do it, Lorraine builds multi-session programs that bring managers, high-potentials, and executive teams up to the same level of confidence and clarity. Programs are designed around your business context, your competencies, and the moment your organization is in."
  bullets:
    - "Multi-session manager and high-potential cohorts (4-8 sessions)"
    - "Executive team intensives focused on presence and communication"
    - "Custom workshops co-designed with L&D and people partners"
    - "Coaching pods that run between live sessions to lock in habits"
  cta_label: "Ask about custom programs"
  cta_url: "/contact"
