testimonials:
  - quote: "I can vouch for these nano tips. Not only did I feel genuine support from Lorraine, but I also felt the power of her celebration of our work as a team that engrained the belief that when one of our team members wins, the whole team also wins!"
    name: "Courtney B."
    initials: "CB"
    photo: "/images/v1/courses/testimonials/courtney-b.webp"
    photo_alt: "Courtney B."
  - quote: "I've always admired her work during her time at LinkedIn and this course is just as good. It includes tips for making sure introverts are heard, ways to give feedback, keeping remote employees engaged during hybrid meetings, and an amazing idea for meetings that don't require team input — asynchronous videos. Great ideas in a short time. Check it out!"
    name: "Nicole H."
    initials: "NH"
    photo: "/images/v1/courses/testimonials/nicole-h.webp"
    photo_alt: "Nicole H."
  - quote: "So many teams have simply transitioned their in-person meetings to virtual ones, but this course offers ways to alleviate meeting boredom and better use the tools on hand to truly engage each other in a virtual setting."
    name: "Jennifer C."
    initials: "JC"
    photo: "/images/v1/courses/testimonials/jennifer-c.webp"
    photo_alt: "Jennifer C."
  - quote: "A very clear presentation and a reminder of why it is so important to get virtual or hybrid meetings and content communications right. To be fully inclusive, it's critical to understand the dynamics of how teams are affected, recognized, or can contribute to team goals."
    name: "Elisa C."
    initials: "EC"
    photo: "/images/v1/courses/testimonials/elisa-c.webp"
    photo_alt: "Elisa C."
  - quote: "Fantastic course on a great topic! The videos are clear and actionable for those who want to transform to a hybrid workplace model seamlessly."
    name: "Lachezar A."
    initials: "LA"
    photo: "/images/v1/courses/testimonials/lachezar-a.webp"
    photo_alt: "Lachezar A."
  - quote: "I was introduced to Lorraine in a free webinar about optimizing virtual meetings, and this is so relevant and valuable — more than ever before! Share this with your managers and your teams to learn how to host better meetings."
    name: "Alexandria L."
    initials: "AL"
    photo: "/images/v1/courses/testimonials/alexandria-l.webp"
    photo_alt: "Alexandria L."
