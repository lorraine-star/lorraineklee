bios_section:
  eyebrow: Approved bios
  heading: Copy-and-paste
  heading_accent: bios.
  note: >-
    Use the version that fits your program or run-of-show. Please keep the bio
    intact and credit Lorraine K. Lee.
bios:
  - length_label: Short — 50 words
    text: >-
      Lorraine K. Lee is a keynote speaker, instructor at Stanford Continuing
      Studies, and former founding editor at LinkedIn and Prezi. She has spoken
      to more than 200 audiences, including Cisco, ServiceNow, Google, and Zoom,
      on executive presence, communication, and what it takes to lead in a
      hybrid era.
  - length_label: Medium — 100 words
    text: >-
      Lorraine K. Lee is a keynote speaker and communication coach who helps
      managers and high-potential leaders show up with the credibility their
      roles already require. She is an instructor at Stanford Continuing Studies
      and a former founding editor at LinkedIn and Prezi, where she built
      editorial and content programs from zero. Lorraine has delivered more than
      200 keynotes for companies including Cisco, ServiceNow, ASICS, Google,
      LinkedIn, and Zoom, and has been featured in Bloomberg, Fast Company,
      CNBC, and Business Insider. Her work focuses on executive presence,
      LinkedIn for leaders, and the small, durable shifts that get people
      promoted.
  - length_label: Long — 200 words
    text: >-
      Lorraine K. Lee is a keynote speaker, communication coach, and instructor
      at Stanford Continuing Studies, where she teaches a top-rated course on
      professional presence. Before keynote work, Lorraine was a founding editor
      at both LinkedIn and Prezi, where she built editorial and content programs
      that reached tens of millions of professionals worldwide.


      Today, she delivers keynotes and workshops to organizations that are
      quietly hoping their rising leaders will become more credible, more
      confident, and harder to overlook. Her signature talks — executive
      presence, LinkedIn for leaders, hybrid leadership, and meeting design —
      are built around durable shifts the audience actually makes, rather than
      tips that fade by Friday.


      Lorraine has spoken to more than 200 audiences, including Cisco,
      ServiceNow, ASICS, Google, McKinsey & Co, LinkedIn, and Zoom, many of whom
      have booked her back multiple times. She has been featured in Bloomberg,
      Fast Company, CNBC, Inc., Entrepreneur, Business Insider, CNN, NBC, and
      Fox.


      She lives in the San Francisco Bay Area and is available for keynotes,
      workshops, custom programs, and panel moderation, both in person and
      remotely. Bookings: 8 to 14 weeks of lead time is typical.
