hero:
  eyebrow: Consulting
  headline: Strategic support for your
  headline_accent: leaders.
  lead: >-
    Get personalized support from Lorraine for your C-Suite, team, or
    organization on a wide range of topics.
  primary_cta_label: Get in touch with Lorraine
  primary_cta_url: /contact
  secondary_cta_label: Explore services
  secondary_cta_url: '#services'
services_section:
  eyebrow: Services
  heading: Ways to work
  heading_accent: together.
  lead: >-
    Engagements are tailored to your goals — from a single executive to an
    entire leadership team.
services:
  - title: LinkedIn C-Suite Strategy
    description: >-
      Create a LinkedIn strategy for your C-Suite and executive leadership team
      to build out their thought leadership and executive presence. With a
      proper LinkedIn strategy in place, your team can see benefits such as more
      speaking engagements, press, and industry visibility. Move beyond the
      profile (although that's still important, too), and build a content
      strategy that gets you seen.
  - title: Content Strategy
    description: >-
      Tap into Lorraine's 10+ years of experience at the intersection of
      editorial and tech to build a content strategy that builds brand
      favorability and awareness organically. Lorraine has led editorial teams
      at companies including LinkedIn, SlideShare, and Prezi.
  - title: Prezi Presentations
    description: >-
      Collaborate with Lorraine to create Prezi presentations that will help you
      stand out in-person and virtually — all while capturing audience
      attention, from board members and employees to prospects and
      decision-makers.
  - title: Improve Meeting Culture
    description: >-
      Lorraine is the creator of two popular LinkedIn Learning courses about how
      to have better virtual and hybrid meetings (more than 30,000+ learners),
      and is the author of Prezi's Meeting Guidebook, which has seen thousands of
      organic downloads. Lorraine has shared her expertise on how to have better
      meetings with companies including Zoom and Cisco.
  - title: Public Speaking
    description: >-
      Looking to conquer a fear greater than death? Train your executives and
      leaders to speak with confidence and connect with their audience virtually
      whether they're speaking at an all-hands meeting, giving a board update, or
      pitching their startup.
testimonials_section:
  eyebrow: Testimonials
  heading: What clients
  heading_accent: say.
