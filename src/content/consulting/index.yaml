      Throughout the entire process of developing the DRIVEN prototype, Lorraine
      has been an instrumental force of guidance on everything from Prezi
      software to positioning actors for webcams and lighting.
    author: Alexandra Levit
    title: Workforce Futurist, WSJ Columnist, Int'l Bestselling Author
  - quote: >-
      She has a proven track record of building brand presence on LinkedIn from
      the ground up, and was able to guide me to focus on approaches that
      maximize ROI.
    author: Katie Kwon
    title: Marketing @ Magic Eden
