seo_title: "Free 5-Day Course: From Invisible to Influential | Lorraine K. Lee"
seo_description: "A free 5-day email course: the system to communicate your value, get visible to decision-makers, and position yourself for the next level in just 20 minutes a day."
hero:
  eyebrow: "FROM INVISIBLE TO INFLUENTIAL"
  headline: "The 5-Day System to Communicate Your Value, Get Visible to Decision-Makers, and Position Yourself for the Next Level"
  headline_suffix: "In Just 20 Minutes a Day"
  support: "Even If You're **Not Sure** What Makes You Stand Out, You Hate Self-Promotion, and You've Been the **Best-Kept Secret** for Too Long"
  image_desktop: "/images/free-course/hero-original.webp"
  image_mobile: "/images/free-course/hero-original.webp"
  image_alt: "Lorraine K. Lee"
  name_placeholder: "First Name"
  email_placeholder: "Enter your best email"
  form_button_label: "SEND ME THE COURSE"
problem:
  heading: "==Does This Sound Like You?=="
  bullets:
    - "You do great work, but you don't get the credit or recognition you deserve"
    - "You're not stuck—you're ready to accelerate your growth"
    - "You're not sure how to communicate your value or what makes you stand out"
    - "You're known to your team, but invisible to your boss's boss and senior leaders"
    - "You want to be visible, but you're terrified of looking fake or salesy"
    - "You want recruiters and opportunities to come to YOU instead of chasing them"
    - "You've been passed over for promotions even though you outperform your peers"
    - "You're ambitious and ready to take control of your career trajectory"
roadmap:
  eyebrow: "Here's How We're Going To Fix That:"
  heading: "Your 5-Day Roadmap From Invisible to Influential"
days:
  - day_label: "Day 1"
    title: "How to Articulate Your Value So People Actually Listen"
    intro: "No more \"I don't know what makes me stand out.\""
    bullets:
      - "Why the most qualified person rarely gets promoted **(hint: it's not about working harder)**."
      - "You'll discover how to talk about your wins without feeling like you're bragging, using **my simple framework** that feels natural."
      - "You'll write your **Unique Value Statement** and know exactly how to share your work in a way that gets noticed."
  - day_label: "Day 2"
    title: "How to Show Up on LinkedIn So Opportunities Come to You"
    intro: "Turn your LinkedIn from a digital resume into an opportunity magnet."
    bullets:
      - "The 3 things to fix first on your profile (in priority order)"
      - "Get a **proven headline formula** that works for any role"
      - "Understand exactly what to post and when."
      - "The 4 content types that work on LinkedIn (No more staring at a blank screen.)"
  - day_label: "Day 3"
    title: "How to Be Known by the People Who Decide Promotions"
    intro: "Stop being the best-kept secret in your organization."
    bullets:
      - "**Who actually decides** whether you get promoted (it's not just your manager)"
      - "**How to build relationships** upward without looking like a suck-up"
      - "What to say in **skip-level conversations.**"
      - "You'll create your **\"who should I meet\" list** and plan your first touchpoint"
  - day_label: "Day 4"
    title: "How to Position Yourself as the Obvious Choice for the Next Level"
    intro: "Discover what's actually required for the next level (and why vague feedback keeps you stuck)."
    bullets:
      - "How to **get specific answers** from your manager,"
      - "How to organize your achievements **so they actually land**"
      - "How **to get eyeballs on your promotion case** before you submit it."
      - "You'll know exactly what's required and **have a plan to close the gaps.**"
  - day_label: "Day 5"
    title: "How to Stay Consistent (Without Burning Out)"
    intro: "Here's how to make this stick without it taking over your life."
    bullets:
      - "**The biggest mistake** people make (pushing too hard at the start)"
      - "How to set boundaries **without feeling guilty**"
      - "**A simple 5-minute daily habit** that changes everything."
      - "Plus, you'll know exactly how to tell if it's working."
