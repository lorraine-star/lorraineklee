      text: "**My book Unforgettable Presence hit #1** on Amazon and was named a must-read by Next Big Idea Club — Published by Wiley, one of the world's top business book publishers. It's the complete guide to getting seen, gaining influence, and catapulting your career."
    - icon: "/images/free-course/trust/hired.png"
      text: "**Stanford hired me to teach** \"The Art of Public Speaking\" (rated 4.8/5)"
    - icon: "/images/free-course/trust/fortune.png"
      text: "**Fortune 500 companies hire me to train their teams** — Amazon, Google, Zoom, Cisco, LinkedIn, Airbnb, McKinsey & Company, and ASICS have all brought me in."
    - icon: "/images/free-course/trust/icon-1.png"
