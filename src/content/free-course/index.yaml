different:
  heading: "==Why This Isn't Like Every Other== \"Build Your Brand\" Course"
  not_items:
    - "This is NOT another \"personal branding\" course that makes you feel like a used car salesman"
    - "This is NOT generic career advice you've already read in 10 books"
    - "This is NOT a time-consuming system that requires hours of commitment"
  is_items:
    - "This IS a practical, template-driven system designed for busy professionals"
    - "This IS built for introverts and ambiverts who hate self-promotion"
    - "This IS focused on strategic visibility—being seen by the RIGHT people, not everyone"
final:
  heading: "Ready to go from invisible to influential?"
  form_button_label: "LET'S DO THIS"
