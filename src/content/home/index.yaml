hero_headline: "Get seen. Gain influence. Build an unforgettable presence."
hero_subheadline: "Keynote speaker, LinkedIn Learning instructor, and author of Unforgettable Presence. I help professionals and teams communicate with confidence and get recognized for the work they do."
