testimonials:
  - quote: >-
      I would HIGHLY recommend Lorraine as an engaging speaker who consistently
      delivers valuable and actionable insights. As a moderator at a LinkedIn
      Asian Alliance ERG event where Lorraine spoke, I was so impressed by her
      captivating speaking style, she kept the audience fully engaged from start
      to finish. She simplified complex and vague topics into practical steps
      that attendees could start implementing immediately.
    author: "Teju K."
    title: "LinkedIn"
    photo: "/images/v1/testimonials/teju-k.webp"
    photo_alt: "Headshot of Teju K."
  - quote: >-
      We had 600+ Googlers, both in person and virtually, attend this session to
      hear Lorraine's insights on areas such as redefining what presence really
      means, harnessing introvert strengths, the role of micro-interactions, how
      we show up on LinkedIn, and more. Lorraine was a great speaker. She was
      confident, engaging, and personable, all while delivering insights that
      truly resonated with the audience.
    author: "Alex Harlan"
    title: "Google"
    photo: "/images/v1/testimonials/alex-harlan.jpeg"
    photo_alt: "Headshot of Alex Harlan"
  - quote: >-
      I'm the ERG lead for a Women's group at Microsoft, and engaged with
      Lorraine through Linkedin to bring her on board as a guest speaker for the
      group. I was confident in signing up with her for a fireside chat. The
      session was clear, concise, and had live examples. Lorraine was easy to
      speak to and had her material prepped for the group. I would highly
      recommend her as a speaker for any public speaking opportunities and I am
      looking forward to continue working with her!
    author: "Apurva Bhagali"
    title: "Microsoft"
    photo: "/images/v1/testimonials/apurva-bhagali.png"
    photo_alt: "Headshot of Apurva Bhagali"
  - quote: >-
      I cannot recommend Lorraine enough as a speaker and subject matter expert.
      As a Career Strategist and producer of live programming for Indeed's Job
      Search Academy, I've had the pleasure of working with her whenever she's
      been a guest on several of our live webinars. In fact, Lorraine was one of
      our very first guest experts, helping us successfully launch our live
      programming. Her expertise in virtual interviewing, personal branding, and
      communication strategies is unmatched, and she has a remarkable ability to
      provide clear, actionable advice to our audience, even when answering
      questions on the fly. The feedback from our attendees is always
      overwhelmingly positive, consistently praising her in-depth knowledge and
      engaging delivery.
    author: "Clint Carrens"
    title: "Indeed"
    photo: "/images/v1/testimonials/clint-carrens.jpeg"
    photo_alt: "Headshot of Clint Carrens"
  - quote: >-
      From vocal delivery to high-stakes boardrooms, Lorraine was completely
      determined to help me level up. We experimented with a range of tailored
      exercises to find exactly what worked for me, and the results were
      immediate. I highly recommend her to any leader looking to show up with
      more power.
    author: "Sophie Choi"
    title: "Affirm"
    photo: "/images/v1/testimonials/sophie-choi.jpeg"
    photo_alt: "Headshot of Sophie Choi"
  - quote: >-
      Lorraine is a fantastic speaker who has given two TED Talk-caliber sessions
      at Cisco. Her talks have been some of the most popular among our group. Her
      presentations are dynamic, interactive, and filled with real-life examples
      that resonated with our team members. I enthusiastically recommend Lorraine
      as a speaker and presenter to any organization. We hope to have her back
      again at Cisco soon!
    author: "Jason R."
    title: "Cisco"
    photo: "/images/v1/testimonials/jason-r.webp"
    photo_alt: "Headshot of Jason R."
  - quote: >-
      From an organizer's perspective, Lorraine is a dream to work with. She's
      responsive, collaborative, and thoughtful about tailoring her content to
      the audience and event goals. She brought creative ideas to the table, was
      proactive about logistics and promotion, and made the whole process smooth
      from start to finish. Our audience loved her! Many attendees asked about
      her public-speaking journey and her approach to building a strong LinkedIn
      presence. Her book even sold out on-site, a clear sign of how much her
      message resonated. I'd highly recommend her for keynotes, fireside chats,
      learning sessions, or co-created courses, she elevates every event she's
      part of!
    author: "Shanice Williams"
    title: "Eventbrite"
    photo: "/images/v1/testimonials/shanice-williams.jpeg"
    photo_alt: "Headshot of Shanice Williams"
  - quote: >-
      I have been following Lorraine on LinkedIn for some time and was so excited
      that we were able to bring her in! She shared the perfect mix of personal
      stories and actionable frameworks to help us stand out and become the CEO
      of our careers. I received a lot of positive feedback from our in person
      and virtual attendees, and I'd recommend her to anyone looking for a
      dynamic speaker. She was very easy to work with and I hope we can bring her
      back again soon!
    author: "Ché Ugwuala"
    title: "Google"
    photo: "/images/v1/testimonials/che-ugwuala.png"
    photo_alt: "Headshot of Ché Ugwuala"
  - quote: >-
      Lorraine brought such a refreshing perspective to the session and shared
      her career journey with authenticity, broke down what "presence" really
      looks like in today's hybrid workplace, and offered smart, actionable ways
      to grow influence, whether you're a people leader or an individual
      contributor. Lorraine also emphasized the importance of visibility at all
      stages of your career and shared strategies for building a strong,
      memorable career brand. We received a lot of positive feedback from our
      global members after the event.
    author: "Lauren DelGuidice"
    title: "Henry Schein"
    photo: "/images/v1/testimonials/lauren-delguidice.jpeg"
    photo_alt: "Headshot of Lauren DelGuidice"
  - quote: >-
      Lorraine recently hosted a workshop for our culture champions on amplifying
      their influence as employee volunteers. She delivered course over three
      virtual workshops spanning different time zones and demonstrated a
      remarkable level of professionalism and expertise. Her proactive approach
      ensured that every session was meticulously planned and executed, catering
      to the diverse needs of our global team. She was not only relatable and
      easy to understand but also fostered an inclusive environment where
      participants felt comfortable engaging and sharing their perspectives.
    author: "Archisman Panigrahi"
    title: "LinkedIn"
    photo: "/images/v1/testimonials/archisman-panigrahi.jpeg"
    photo_alt: "Headshot of Archisman Panigrahi"
  - quote: >-
      I'm so glad that Lorraine came to speak to the GitLab team during our
      All-Remote Communications speaker series. Her presentation was engaging,
      easy to follow, and introduced our team to new and innovative ideas on how
      to improve our video communications. Her presentation encouraged engagement
      in an authentic way that made everyone enjoy the call. Lorraine was open to
      having a Q&A after her presentation, which was a great way for our team
      members to connect with her directly.
    author: "Samantha L."
    title: "GitLab"
    photo: "/images/v1/testimonials/samantha-l.webp"
    photo_alt: "Headshot of Samantha L."
  - quote: >-
      Lorraine's ability to captivate and engage her audience during a virtual
      event is exceptional. Her use of insightful graphics, a warm and engaging
      delivery style, and interactive activities made the session both
      stimulating and educational. I was particularly impressed by her practical
      strategies for enhancing one's executive presence in a digital context. One
      technique that stood out to me was on how to position my camera on my body
      while speaking. I highly recommend her sessions to any professional looking
      to refine their executive presence and communicative impact.
    author: "Cristian Garcia Cortez"
    title: "Cisco"
    photo: "/images/v1/testimonials/cristian-garcia-cortez.jpeg"
    photo_alt: "Headshot of Cristian Garcia Cortez"
  - quote: >-
      Lorraine gave a session on the topic of building influence to our small
      group of affinity group members at eero/Amazon, and she did not
      disappoint! Our attendees gave glowing feedback about how useful and
      informative the session was. It was packed with a wealth of data-driven
      insights, actionable recommendations, and opportunities for audience
      members to weigh in and stay engaged. Although our group was a bit quiet,
      Lorraine was super professional, and her content made the hour pass by in a
      flash. We would love to host her again!
    author: "Amy J."
    title: "Amazon"
    photo: "/images/v1/testimonials/amy-j.webp"
    photo_alt: "Headshot of Amy J."
  - quote: >-
      I had a pleasure to work with Lorraine for one of career event for our
      community. Lorraine delivered an outstanding session on Supercharging
      Executive Presence for our team, and it was nothing short of
      transformative. Her deep expertise, engaging style, and actionable insights
      left a lasting impression on everyone. Lorraine broke down complex topics
      like crafting a Unique and Powerful Introduction (UPI), eliminating
      minimizing language for effective communication, and building credibility
      in both in-person and virtual settings in a way that was easy to understand
      and immediately applicable. Her session has truly empowered our leaders to
      elevate their professional presence and leadership impact.
    author: "Duy Tu Nguyen"
    title: "Nike"
    photo: "/images/v1/testimonials/duy-tu-nguyen.jpeg"
    photo_alt: "Headshot of Duy Tu Nguyen"
  - quote: >-
      She did an amazing job being a resource for our Black History Month virtual
      career fair, that I immediately seized the opportunity to bring her back
      for a live opportunity. Lorraine was beyond what I expected in-person. She
      is an events manager's dream, she is organized, punctual and produces
      thoughtful content for the intended audience. Her live presentation was
      filled with great insight about how to present your best-self on LinkedIn.
    author: "Dorienne B."
    title: "National Urban League"
    photo: "/images/v1/testimonials/dorienne-b.webp"
    photo_alt: "Headshot of Dorienne B."
  - quote: >-
      I am a Principal Success Architect at ServiceNow and was fortunate to sign
      up for Lorraine's presentation on Supercharging Your Executive Presence,
      which was sponsored by ServiceNow's Asian and Pacific Islander Employee
      Belonging Group. Lorraine gave an impactful presentation on the Three C's
      (Communication, Career Brand, and Credibility), which captured the
      audience's attention in an authentic way that led to a high rate of
      participation. Lorraine shared clear examples and actionable steps for
      everyone to improve their personal brand and executive presence.
    author: "Alan Lau"
    title: "ServiceNow"
    photo: "/images/v1/testimonials/alan-lau.jpeg"
    photo_alt: "Headshot of Alan Lau"
