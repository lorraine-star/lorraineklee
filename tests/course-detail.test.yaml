# Representative course detail page; covers the /courses/[slug] template.
# Pinned slug: the `better-business-writing` entry must exist in the courses
# collection. If it's renamed/removed, this navigate 404s — repoint to another
# course slug (and update the title assertion to match).
steps:
  - navigate: /courses/better-business-writing
  - assert: The page heading reads "Nano Tips for Better Business Writing"
  - assert: A "Watch on LinkedIn Learning" call-to-action link is visible
  - assert: A back link labeled "All courses" pointing to the courses list is present
  - assert: Trust copy reading "Free to watch with a LinkedIn Learning subscription." is present
