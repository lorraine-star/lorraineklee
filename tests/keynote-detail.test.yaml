# Representative keynote detail page; covers the /keynotes/[slug] template.
# Pinned slug: the `how-to-present-like-a-pro` entry must exist in the keynotes
# collection. If it's renamed/removed, this navigate 404s — repoint to another
# keynote slug (and update the title/takeaways assertions to match).
steps:
  - navigate: /keynotes/how-to-present-like-a-pro
  - assert: The page heading reads "How to Present Like a Pro"
  - assert: A "Book this talk" call-to-action link is visible
  - assert: A back link labeled "All keynotes" pointing to the keynotes list is present
  - assert: A "What the audience walks away with" section lists the talk's takeaways
